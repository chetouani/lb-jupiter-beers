<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <link rel="stylesheet" href="styles.css" />
        <link rel="stylesheet" href="colors.css" />
        <link rel="stylesheet" href="frame.css" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700&display=swap" rel="stylesheet" />
    </head>
    <body>
        <div id="phone-wrapper">
            <div class="app" id="content">

                <!-- Loading Screen -->
                <div id="loading-screen" class="screen active">
                    <div class="loading-content">
                        <img class="loading-logo" src="assets/jupiter-icon-no-bg.png" alt="Jupiter" />
                        <div class="orbit orbit-1"><span class="star">★</span></div>
                        <div class="orbit orbit-2"><span class="star">★</span></div>
                        <div class="orbit orbit-3"><span class="star">★</span></div>
                        <div class="orbit orbit-4"><span class="star">★</span></div>
                        <div class="orbit orbit-5"><span class="bubble">○</span></div>
                        <div class="orbit orbit-6"><span class="bubble">○</span></div>
                    </div>
                </div>

                <!-- Tab Bar -->
                <div class="tab-bar" id="tab-bar">
                    <button class="tab-btn active" data-screen="catalog-screen">🍺 Catalogue</button>
                    <button class="tab-btn" data-screen="votes-screen">🏆 Votes</button>
                    <button class="tab-btn" data-screen="dealers-screen">🏪 Revendeurs</button>
                </div>

                <!-- Catalog Screen -->
                <div id="catalog-screen" class="screen">
                    <div class="carousel-wrapper">
                        <div class="carousel-row">
                            <div class="carousel" id="carousel"></div>
                        </div>
                        <div class="carousel-dots" id="carousel-dots"></div>
                    </div>
                </div>

                <!-- Votes Screen -->
                <div id="votes-screen" class="screen">
                    <div class="votes-header">Classement</div>
                    <div class="votes-container">
                        <div class="votes-list" id="votes-list"></div>
                        <div class="votes-overlay">Bientôt disponible</div>
                    </div>
                </div>

                <!-- Dealers Screen -->
                <div id="dealers-screen" class="screen">
                    <div class="votes-header">Revendeurs</div>
                    <div class="dealers-list">
                        <div class="dealer-card">
                            <img class="dealer-icon" src="assets/ltd-icon.webp" alt="LTD" />
                            <div class="dealer-info">
                                <span class="dealer-name">LTD</span>
                                <span class="dealer-zip">📍 Anderlecht - 366</span>
                            </div>
                        </div>
                        <div class="dealer-card">
                            <img class="dealer-icon" src="assets/tequilala-icon.png" alt="Tequi-la-la" />
                            <div class="dealer-info">
                                <span class="dealer-name">Tequi-la-la</span>
                                <span class="dealer-zip">📍 Ixelles - 513</span>
                            </div>
                        </div>
                        <div class="dealer-card">
                            <img class="dealer-icon" src="assets/bahamas-icon-2.jpeg" alt="Bahamas" />
                            <div class="dealer-info">
                                <span class="dealer-name">Bahamas</span>
                                <span class="dealer-zip">📍 Uccle - 628</span>
                            </div>
                        </div>
                        <div class="dealer-card">
                            <img class="dealer-icon" src="assets/jupiter-icon-no-bg.png" alt="Jupiter" />
                            <div class="dealer-info">
                                <span class="dealer-name">Jupiter</span>
                                <span class="dealer-zip">📍 Alost - 3020</span>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <script src="dev.js"></script>
        <script>
            function loadApp() {
                if (document.getElementById('script-loaded')) return;
                const script = document.createElement('script');
                script.src = 'script.js';
                script.id = 'script-loaded';
                document.body.appendChild(script);
            }

            window.addEventListener('message', (e) => {
                if (e.data === 'componentsLoaded') {
                    loadApp();
                }
            });

            // Fallback for browser testing
            window.addEventListener('load', () => {
                setTimeout(loadApp, 100);
            });
        </script>
    </body>
</html>
